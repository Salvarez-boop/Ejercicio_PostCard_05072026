<!DOCTYPE html>
<html lang="es">
	<head>
		<meta charset="ETF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>My PostCard</title>
		<link rel="stylesheet" href="styles.css" />
	</head>
	<body>
		<div class="postcard">
			<div class="postcard-header">
				<h1>My Postcard</h1>
				<img
					src="https://raw.githubusercontent.com/breatheco-de/exercise-postcard/e63a7916530cc850bd92aa1c2e19191837fb5c80/.learn/assets/4geeks.png"
					alt="Logo_4Geeks"
				/>
			</div>
			<div class="postcard-body">
				<div class="body-left">
					<p>Look how awesome This is a poscard that I created using HTML5 and CSS3 durign my 4Geek Academy Course</p>
					<p>This is so cool, cant wait to starting doing more stuff</p>
				</div>

				<div class="body-right">
					<input type="text" placeholder="Some Name" id="Name" /> <br />
					<input type="text" placeholder="Some Mail" id="Mail" /> <br />
					<input type="text" placeholder="Some Comment" id="Comment" />
				</div>
			</div>
			<div class="postcard-footer">
				<button>Send My Postcard</button>
			</div>
		</div>
	</body>
</html>
